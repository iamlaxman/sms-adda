<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=yes">
  <meta name="description" content="SMS Adda – Real-time chat with voice calls, file sharing, and push notifications.">
  <meta name="theme-color" content="#F8FAFC" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)">
  <title>SMS Adda - Chat</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --primary:#2563EB;--primary-hover:#1D4ED8;--primary-light:#EFF6FF;
      --bg:#F8FAFC;--surface:#FFFFFF;--border:#E2E8F0;
      --heading:#0F172A;--body:#475569;--muted:#94A3B8;
      --online:#10B981;--offline:#94A3B8;--danger:#EF4444;--success:#16A34A;
      --msg-own:#2563EB;--msg-own-text:#FFFFFF;
      --msg-other:#F1F5F9;--msg-other-text:#0F172A;
      --dots-color:#64748B;
      --shadow-sm:0 1px 2px rgba(0,0,0,0.03);
      --shadow-md:0 4px 12px rgba(0,0,0,0.05);
      --shadow-lg:0 12px 30px rgba(0,0,0,0.08);
      --shadow-xl:0 20px 50px rgba(0,0,0,0.12);
      --radius-sm:6px;--radius-md:12px;--radius-lg:18px;--radius-xl:24px;
      --transition:180ms ease;--header-h:56px;--sidebar-w:280px;
    }
    body.dark{
      --bg:#020617;--surface:#0F172A;--border:#1E293B;
      --heading:#F1F5F9;--body:#CBD5E1;--muted:#64748B;
      --primary-light:#1E3A8A;--offline:#475569;
      --msg-other:#1E293B;--msg-other-text:#E2E8F0;
      --dots-color:#94A3B8;
    }
    body{
      font-family:'Inter',system-ui,sans-serif;
      background:var(--bg);color:var(--body);
      height:100vh;height:100dvh;overflow:hidden;
      display:flex;flex-direction:column;position:fixed;inset:0;
      transition:background 300ms,color 300ms;
      -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;
    }
    .header{height:var(--header-h);min-height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:6px;z-index:40;flex-shrink:0}
    .header-info{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
    .header-title{font-weight:600;color:var(--heading);font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .header-badge{font-size:0.68rem;color:var(--muted);display:flex;align-items:center;gap:4px;white-space:nowrap}
    .header-dot{width:7px;height:7px;border-radius:50%;background:var(--online)}
    .header-actions{display:flex;gap:1px;align-items:center}
    .btn-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:transparent;border:none;color:var(--body);cursor:pointer;transition:all var(--transition);flex-shrink:0}
    .btn-icon:hover{background:var(--border);color:var(--heading)}
    .btn-icon:active{transform:scale(0.92)}
    .menu-btn{display:none}
    .app-body{display:flex;flex:1;overflow:hidden}
    .sidebar{width:var(--sidebar-w);border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;flex-shrink:0;transition:transform 0.25s;z-index:35;height:100%}
    .sidebar-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border)}
    .sidebar-title{font-weight:700;font-size:0.85rem;color:var(--heading)}
    .sidebar-tabs{display:flex;border-bottom:1px solid var(--border)}
    .sidebar-tab{flex:1;padding:10px;text-align:center;font-weight:600;font-size:0.78rem;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all var(--transition);font-family:inherit;border-bottom:2px solid transparent}
    .sidebar-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
    .sidebar-search{padding:8px 10px;border-bottom:1px solid var(--border)}
    .search-input{width:100%;padding:7px 11px;border-radius:18px;border:1px solid var(--border);background:var(--bg);font-size:0.78rem;outline:none;color:var(--heading);font-family:inherit}
    .search-input:focus{border-color:var(--primary)}
    .user-list{flex:1;overflow-y:auto;padding:4px;-webkit-overflow-scrolling:touch}
    .user-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;transition:all var(--transition);-webkit-tap-highlight-color:transparent;user-select:none}
    .user-item:hover{background:var(--bg)}
    .user-item:active{transform:scale(0.98)}
    .user-item.active{background:var(--primary-light);border:1px solid var(--primary)}
    .user-item.busy{opacity:0.6}
    .user-item.busy .user-bio{color:var(--danger)}
    .user-avatar{width:36px;height:36px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;overflow:hidden}
    .user-avatar img{width:100%;height:100%;object-fit:cover}
    .status-dot{position:absolute;bottom:1px;right:1px;width:9px;height:9px;border-radius:50%;border:2px solid var(--surface)}
    .status-dot.online{background:var(--online)}.status-dot.offline{background:var(--offline)}.status-dot.busy{background:var(--danger)}
    .user-info{flex:1;min-width:0}
    .user-name{font-weight:500;color:var(--heading);font-size:0.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .user-bio{font-size:0.68rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .chat-main{flex:1;display:flex;flex-direction:column;background:var(--bg);min-width:0}
    .msgs{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:2px;scroll-behavior:auto;-webkit-overflow-scrolling:touch}
    .msgs .empty-state{margin:auto}
    .msg-row{display:flex;gap:5px;max-width:75%;position:relative;animation:fadeIn 0.2s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .msg-row.own{align-self:flex-end;flex-direction:row-reverse}
    .msg-row.deleted{opacity:0.4}
    .msg-av{width:26px;height:26px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
    .msg-av img{width:100%;height:100%;object-fit:cover}
    .msg-wrap{display:flex;flex-direction:column;min-width:0;max-width:100%}
    .msg-meta{display:flex;align-items:baseline;gap:5px;padding:0 3px;margin-bottom:1px}
    .msg-row.own .msg-meta{flex-direction:row-reverse}
    .msg-sender{font-weight:600;font-size:0.64rem;color:var(--heading)}
    .msg-time{font-size:0.56rem;color:var(--muted)}
    .msg-bubble-wrap{display:flex;align-items:flex-end;gap:2px}
    .msg-row.own .msg-bubble-wrap{flex-direction:row-reverse}
    .msg-bubble{padding:7px 10px;border-radius:14px;line-height:1.4;word-break:break-word;background:var(--msg-other);color:var(--msg-other-text);max-width:100%;position:relative}
    .msg-row.own .msg-bubble{background:var(--msg-own);color:var(--msg-own-text)}
    .msg-row:not(.own) .msg-bubble{border-bottom-left-radius:4px}
    .msg-row.own .msg-bubble{border-bottom-right-radius:4px}
    .msg-text{font-size:0.84rem;display:inline}
    .msg-menu-wrap{position:relative;flex-shrink:0;align-self:center}
    .msg-dots{width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%;color:var(--dots-color);font-size:0.9rem;font-weight:700;transition:all var(--transition);user-select:none;opacity:0.7}
    .msg-dots:hover{background:rgba(0,0,0,0.08);opacity:1;color:var(--heading)}
    .msg-row.own .msg-dots{color:rgba(255,255,255,0.7)}
    .msg-row.own .msg-dots:hover{background:rgba(255,255,255,0.2);color:#fff}
    .msg-menu{display:none;position:absolute;bottom:100%;right:0;margin-bottom:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px;box-shadow:var(--shadow-lg);z-index:50;min-width:110px;animation:menuIn 0.12s ease}
    @keyframes menuIn{from{opacity:0;transform:translateY(4px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
    .msg-menu.show{display:block}
    .msg-menu button{display:flex;align-items:center;gap:5px;padding:7px 9px;width:100%;border:none;background:none;cursor:pointer;font-size:0.74rem;color:var(--heading);border-radius:4px;transition:background var(--transition);font-family:inherit;white-space:nowrap}
    .msg-menu button:hover{background:var(--bg)}
    .msg-menu button.danger{color:var(--danger)}
    .msg-reply-preview{background:rgba(0,0,0,0.03);border-left:3px solid var(--primary);padding:4px 7px;border-radius:3px;margin-bottom:4px;font-size:0.68rem;cursor:pointer;opacity:0.8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .msg-row.own .msg-reply-preview{background:rgba(255,255,255,0.1);border-left-color:rgba(255,255,255,0.5)}
    .msg-img-wrap{margin-top:4px;border-radius:7px;overflow:hidden;max-width:170px;cursor:pointer}
    .msg-img-wrap img{width:100%;display:block;border-radius:7px;transition:transform 0.2s}
    .msg-img-wrap:hover img{transform:scale(1.03)}
    .msg-file-wrap{display:flex;align-items:center;gap:6px;margin-top:4px;padding:6px 9px;border-radius:7px;cursor:pointer;background:rgba(0,0,0,0.03);transition:background 0.2s}
    .msg-file-wrap:hover{background:rgba(0,0,0,0.06)}
    .msg-row.own .msg-file-wrap{background:rgba(255,255,255,0.1)}
    .msg-row.own .msg-file-wrap:hover{background:rgba(255,255,255,0.18)}
    .msg-file-name{font-size:0.74rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
    .msg-file-size{font-size:0.64rem;color:var(--muted)}
    .audio-player{display:flex;align-items:center;gap:6px;margin-top:3px;min-width:140px}
    .audio-btn{width:30px;height:30px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.2s;background:var(--primary);color:#fff}
    .audio-btn.playing{background:var(--danger)}
    .msg-row.own .audio-btn{background:#fff;color:var(--primary)}
    .msg-row.own .audio-btn.playing{background:#fee2e2;color:var(--danger)}
    .audio-wave{flex:1;height:18px;display:flex;align-items:flex-end;gap:1px;min-width:45px}
    .audio-wave .bar{flex:1;background:var(--primary);border-radius:1px;opacity:0.35;min-width:2px}
    .audio-wave .bar.active{opacity:1}
    .msg-row.own .audio-wave .bar{background:rgba(255,255,255,0.6)}
    .audio-dur{font-size:0.6rem;color:var(--muted);min-width:28px;text-align:right}
    .msg-row.own .audio-dur{color:rgba(255,255,255,0.6)}
    .system-msg{text-align:center;font-size:0.68rem;color:var(--muted);padding:3px 0;align-self:center}
    .typing{display:flex;align-items:center;gap:5px;padding:2px 14px;font-size:0.68rem;color:var(--muted);flex-shrink:0}
    .typing-dots{display:flex;gap:2px}
    .typing-dots span{width:4px;height:4px;background:var(--muted);border-radius:50%;animation:dotPulse 1.2s infinite}
    .typing-dots span:nth-child(2){animation-delay:0.2s}.typing-dots span:nth-child(3){animation-delay:0.4s}
    @keyframes dotPulse{0%,60%,100%{opacity:0.3}30%{opacity:1}}
    
    /* ===== CALL OVERLAY - REDESIGNED ===== */
    .call-overlay{
      display:none;position:fixed;inset:0;z-index:300;
      background:linear-gradient(180deg,#0a0a14 0%,#12122a 40%,#0a0a14 100%);
      flex-direction:column;align-items:center;justify-content:center;
      padding:20px;gap:32px;
    }
    .call-overlay.open{display:flex}
    .call-top-bar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top))}
    .call-center{display:flex;flex-direction:column;align-items:center;gap:12px}
    .call-avatar-ring{
      width:100px;height:100px;border-radius:50%;position:relative;
      display:flex;align-items:center;justify-content:center;
    }
    .call-avatar-ring::before{
      content:'';position:absolute;inset:-8px;border-radius:50%;
      border:2px solid rgba(255,255,255,0.1);animation:ringPulse 2s ease-in-out infinite;
    }
    @keyframes ringPulse{0%,100%{transform:scale(1);opacity:0.3}50%{transform:scale(1.1);opacity:0.6}}
    .call-avatar-img{
      width:100px;height:100px;border-radius:50%;
      background:linear-gradient(135deg,#2563EB,#7C3AED,#EC4899);
      display:flex;align-items:center;justify-content:center;
      font-size:2.5rem;font-weight:700;color:#fff;
    }
    .call-name{font-size:1.5rem;font-weight:700;color:#fff;text-align:center}
    .call-status-text{font-size:0.9rem;color:#888;text-align:center}
    .call-status-text.connected{color:#34C759}
    .call-timer-display{font-size:1.3rem;font-weight:600;color:#fff;font-variant-numeric:tabular-nums;display:none}
    .call-bottom{display:flex;flex-direction:column;align-items:center;gap:28px}
    .call-controls-row{display:flex;align-items:center;justify-content:center;gap:24px}
    .call-ctrl-item{display:flex;flex-direction:column;align-items:center;gap:6px}
    .call-ctrl-btn{
      width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:all 0.2s;color:#fff;
    }
    .call-ctrl-btn:active{transform:scale(0.9)}
    .call-ctrl-btn.mute-btn{background:rgba(255,255,255,0.1)}
    .call-ctrl-btn.mute-btn:hover{background:rgba(255,255,255,0.2)}
    .call-ctrl-btn.mute-btn.muted{background:#FF3B30}
    .call-ctrl-btn.end-btn{background:#FF3B30;width:60px;height:60px}
    .call-ctrl-btn.end-btn:hover{background:#d63031}
    .call-ctrl-label{font-size:0.65rem;color:#999}
    
    /* Call Dialog */
    .call-dialog-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:250;display:flex;align-items:center;justify-content:center;padding:20px}
    .call-dialog{background:var(--surface);border-radius:24px;padding:32px 24px;text-align:center;max-width:320px;width:100%;animation:dialogIn 0.3s ease}
    @keyframes dialogIn{from{opacity:0;transform:scale(0.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .call-dialog-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#2563EB,#7C3AED);display:inline-flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:700;color:#fff;margin-bottom:12px}
    .call-dialog-name{font-size:1.2rem;font-weight:700;color:var(--heading);margin-bottom:4px}
    .call-dialog-status{font-size:0.85rem;color:var(--muted);margin-bottom:20px}
    .call-dialog-actions{display:flex;gap:16px;justify-content:center}
    .call-dialog-btn{width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
    .call-dialog-btn:active{transform:scale(0.9)}
    .call-dialog-btn.accept{background:#34C759;color:#fff}
    .call-dialog-btn.accept:hover{background:#2db84e}
    .call-dialog-btn.reject{background:#FF3B30;color:#fff}
    .call-dialog-btn.reject:hover{background:#d63031}
    
    .preview-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:200;align-items:center;justify-content:center;flex-direction:column}
    .preview-overlay.open{display:flex}
    .preview-overlay img{max-width:92vw;max-height:75vh;border-radius:10px}
    .preview-file-card{background:var(--surface);border-radius:14px;padding:30px 22px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px}
    .preview-actions{margin-top:12px;display:flex;gap:8px}
    .preview-btn{padding:8px 16px;border-radius:20px;font-weight:600;font-size:0.8rem;border:none;cursor:pointer;color:#fff;display:flex;align-items:center;gap:4px;transition:all 0.2s}
    .preview-btn.download{background:var(--primary)}
    .preview-btn.close{background:rgba(255,255,255,0.12)}
    
    .recording-bar{display:none;align-items:center;gap:7px;padding:7px 10px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
    .recording-bar.active{display:flex}
    .rec-dot{width:7px;height:7px;border-radius:50%;background:var(--danger);animation:blink 1s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    .rec-timer{font-size:0.76rem;font-weight:600;color:var(--heading);min-width:30px}
    .rec-wave{flex:1;height:16px;display:flex;align-items:center;gap:1px}
    .rec-wave-bar{width:2px;background:var(--primary);border-radius:1px;animation:recAnim 0.6s infinite ease-in-out}
    .rec-wave-bar:nth-child(1){height:4px;animation-delay:0s}.rec-wave-bar:nth-child(2){height:10px;animation-delay:0.1s}
    .rec-wave-bar:nth-child(3){height:16px;animation-delay:0.2s}.rec-wave-bar:nth-child(4){height:10px;animation-delay:0.3s}
    .rec-wave-bar:nth-child(5){height:4px;animation-delay:0.4s}
    @keyframes recAnim{0%,100%{transform:scaleY(0.4)}50%{transform:scaleY(1)}}
    .preview-bar{display:none;align-items:center;gap:8px;padding:7px 12px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
    .preview-bar.active{display:flex}
    .input-area{padding:6px 8px 8px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:flex-end;gap:4px;flex-shrink:0}
    .msg-input{flex:1;border:1px solid var(--border);border-radius:18px;padding:8px 12px;font-size:0.82rem;resize:none;outline:none;background:var(--bg);color:var(--heading);max-height:70px;line-height:1.4;overflow-y:auto;scrollbar-width:none;font-family:inherit}
    .msg-input::-webkit-scrollbar{display:none}
    .msg-input:focus{border-color:var(--primary)}
    .send-btn{width:34px;height:34px;border-radius:50%;background:var(--primary);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.2s}
    .send-btn:active{transform:scale(0.9)}
    .send-btn:disabled{opacity:0.5}
    .drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:30}
    .close-sidebar{display:none}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;max-width:350px;width:90%;box-shadow:var(--shadow-xl);text-align:center;max-height:85vh;overflow-y:auto}
    .modal-box h3{font-size:1rem;font-weight:700;color:var(--heading);margin-bottom:10px}
    .avatar-upload{width:60px;height:60px;border-radius:50%;margin:0 auto 10px;cursor:pointer;overflow:hidden;position:relative;background:var(--border)}
    .avatar-upload img{width:100%;height:100%;object-fit:cover}
    .avatar-upload .overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;color:#fff}
    .avatar-upload:hover .overlay{opacity:1}
    .form-group{margin-bottom:8px;text-align:left}
    .form-group label{display:block;font-size:0.73rem;font-weight:600;color:var(--heading);margin-bottom:2px}
    .form-group input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:0.8rem;outline:none;background:var(--bg);color:var(--heading);font-family:inherit}
    .form-group input:focus{border-color:var(--primary)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:7px 14px;border-radius:16px;font-weight:600;font-size:0.8rem;border:none;cursor:pointer;transition:all var(--transition);font-family:inherit}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--heading)}
    .confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150;align-items:center;justify-content:center}
    .confirm-overlay.open{display:flex}
